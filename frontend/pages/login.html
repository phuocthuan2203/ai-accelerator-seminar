<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tool Lending Platform</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="app">
        <header>
            <nav class="navbar">
                <h1>Tool Lending Platform</h1>
            </nav>
        </header>

        <main id="main-content">
            <div id="login-page">
                <h2>Log In to Your Account</h2>

                <!-- Rule #2: Login form -->
                <form id="login-form" class="auth-form">
                    <!-- Username field -->
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter your username"
                            required
                        >
                        <div class="validation-message" id="username-error"></div>
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <!-- Rule #9: Use type="password" -->
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                        <div class="validation-message" id="password-error"></div>
                    </div>

                    <!-- Submit button -->
                    <button type="submit" id="login-btn" class="btn btn-primary">
                        Log In
                    </button>

                    <!-- Rule #8: Error message display -->
                    <div id="error-message" class="error-message" style="display: none;"></div>

                    <!-- Rule #7: Success message -->
                    <div id="success-message" class="success-message" style="display: none;"></div>
                </form>

                <p>
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </div>
        </main>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
