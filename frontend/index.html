<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Lending Platform</title>

    <!-- Design system styles -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div id="app" class="public-layout">
        <!-- Header / Navbar -->
        <header>
            <nav class="navbar">
                <div class="navbar-brand">Tool Lending</div>
                <div id="nav-menu" class="navbar-menu">
                    <!-- Navigation buttons injected here by app.js -->
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="public-layout-main">
            <!-- Page content will be loaded here -->
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-section">
                    <div class="footer-brand">Tool Lending</div>
                    <p style="font-size: 0.875rem; line-height: 1.5; margin-top: 1rem; color: rgba(255, 255, 255, 0.7);">
                        Empowering communities through shared resources.
                    </p>
                </div>
                <div class="footer-section">
                    <h3>Platform</h3>
                    <ul>
                        <li><a href="#dashboard">Dashboard</a></li>
                        <li><a href="#tools">Browse Tools</a></li>
                        <li><a href="#requests">My Requests</a></li>
                        <li><a href="#profile">Profile</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>Company</h3>
                    <ul>
                        <li><a href="#about">About Us</a></li>
                        <li><a href="#privacy">Privacy Policy</a></li>
                        <li><a href="#terms">Terms of Service</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                </div>
            </div>
        </footer>

        <!-- Chatbot FAB -->
        <button class="chatbot-fab" title="Chat with AI" aria-label="Open AI chat">
            💬
        </button>
    </div>

    <!-- Application scripts -->
    <script src="/js/app.js"></script>
</body>
</html>
